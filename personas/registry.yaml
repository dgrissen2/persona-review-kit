# persona-review-kit persona registry
#
# HUMAN-FACING MANIFEST ONLY. The resolver (persona_registry.py) does NOT read this file —
# it discovers personas from each .md file's YAML frontmatter. This list is a convenient
# at-a-glance inventory; the canonical, always-current inventory (including every alias) is:
#     python3 ../skills/persona-registry/scripts/persona_registry.py --list
# Keep this file in sync when adding/removing a persona, but treat the frontmatter as truth.
#
# Paths are relative to this file (the personas/ directory).
personas:
